<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thank You Surprise</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #1e1b4b, #0f172a);
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* Button */
.thank-link {
  text-decoration: none;
  color: white;
  font-size: 26px;
  padding: 16px 35px;
  border-radius: 50px;
  background: linear-gradient(45deg, #ff4d6d, #ff9a8b);
  transition: all 0.3s ease;
  z-index: 2;
}

.thank-link:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px rgba(255, 77, 109, 0.8);
}

/* Message */
.message {
  position: absolute;
  color: white;
  font-size: 38px;
  text-align: center;
  width: 80%;
  opacity: 0;
  transform: scale(0.7);
  transition: all 0.4s ease;
}

.show {
  opacity: 1;
  transform: scale(1);
}

/* Confetti */
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  opacity: 0.9;
  animation: fall linear forwards;
}

@keyframes fall {
  0% {
    transform: translateY(-50px) rotate(0deg);
  }
  100% {
    transform: translateY(100vh) rotate(720deg);
  }
}
</style>

</head>
<body>

<a href="#" class="thank-link" onclick="explode(event)">🎉 Tap Me 🎉</a>
<div id="msg" class="message"></div>

<script>
function explode(e) {
  e.preventDefault();

  const msg = document.getElementById("msg");

  // Typewriter message
  const text = "Thank you for being there for me 💖";
  let i = 0;
  msg.classList.add("show");
  msg.innerHTML = "";

  function typeWriter() {
    if (i < text.length) {
      msg.innerHTML += text.charAt(i);
      i++;
      setTimeout(typeWriter, 40);
    }
  }
  typeWriter();

  // Confetti colors
  const colors = ["#ff4d6d", "#ffd166", "#06d6a0", "#118ab2", "#ffffff"];

  // Create confetti
  for (let i = 0; i < 120; i++) {
    let confetti = document.createElement("div");
    confetti.className = "confetti";

    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.left = Math.random() * window.innerWidth + "px";
    confetti.style.animationDuration = (Math.random() * 2 + 2) + "s";
    confetti.style.width = confetti.style.height = (Math.random() * 8 + 5) + "px";

    document.body.appendChild(confetti);

    setTimeout(() => {
      confetti.remove();
    }, 4000);
  }
}
</script>

</body>
