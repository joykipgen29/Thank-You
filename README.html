<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Letter 💌</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: #f5f1e6;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Georgia, serif;
        overflow: hidden;
    }

    .envelope {
        width: 320px;
        height: 220px;
        position: relative;
        cursor: pointer;
        perspective: 1000px;
    }

    .base {
        width: 100%;
        height: 100%;
        background: #e6d3a3;
        position: absolute;
        bottom: 0;
        border-radius: 10px;
        z-index: 1;
        box-shadow: 0 15px 25px rgba(0,0,0,0.2);
    }

    .flap {
        width: 0;
        height: 0;
        border-left: 160px solid transparent;
        border-right: 160px solid transparent;
        border-top: 110px solid #d9c08a;
        position: absolute;
        top: 0;
        transform-origin: top;
        transition: transform 1s ease;
        z-index: 3;
    }

    .letter {
        width: 280px;
        height: 180px;
        background: #fff5dc;
        position: absolute;
        left: 50%;
        transform: translate(-50%, 20px);
        bottom: 10px;
        border-radius: 10px;
        text-align: center;
        padding: 20px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        z-index: 2;
        transition: transform 1s ease;
        overflow: hidden;
    }

    .text {
        font-size: 1.2rem;
        color: #5a4632;
        line-height: 1.5;
        white-space: pre-wrap;
    }

    .birds {
        margin-top: 15px;
        font-size: 1.8rem;
        animation: sway 2s infinite alternate;
    }

    @keyframes sway {
        from { transform: rotate(-5deg); }
        to { transform: rotate(5deg); }
    }

    .envelope.open .flap {
        transform: rotateX(180deg);
    }

    .envelope.open .letter {
        transform: translate(-50%, -120px);
    }

    /* floating hearts */
    .heart {
        position: absolute;
        color: #ff3b6b;
        font-size: 18px;
        animation: floatUp 4s linear forwards;
        pointer-events: none;
    }

    @keyframes floatUp {
        0% { transform: translateY(0) scale(0.5); opacity: 0; }
        20% { opacity: 1; }
        100% { transform: translateY(-200px) scale(1.2); opacity: 0; }
    }
</style>
</head>

<body>

<div class="envelope" onclick="openLetter(this)">
    <div class="flap"></div>
    <div class="base"></div>

    <div class="letter">
        <div class="text" id="text"></div>
        <div class="birds">🕊️💞🕊️</div>
    </div>
</div>

<script>
const message =
"❤️ THANK YOU SO MUCH MY BABY ❤️\n\nYou are my calm, my smile, my everything 💛";

let opened = false;

function openLetter(el) {
    if (opened) return;
    opened = true;

    el.classList.add("open");

    playSound();
    startTyping();
    startHearts();
}

/* typing effect */
function startTyping() {
    const target = document.getElementById("text");
    let i = 0;

    function type() {
        if (i < message.length) {
            target.innerHTML += message.charAt(i);
            i++;
            setTimeout(type, 40);
        }
    }
    type();
}

/* heart rain */
function startHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.top = "70%";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 4000);
    }, 200);
}

/* soft paper sound using WebAudio */
function playSound() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const oscillator = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(180, audioCtx.currentTime);
    oscillator.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 1);

    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);

    oscillator.connect(gain);
    gain.connect(audioCtx.destination);

    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 1);
}
</script>

</body>
</html>
